<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0f1e" />
    <title>Sun &amp; Moon</title>

    <!-- Favicons + home-screen icons (generated by `npm run icons`, see scripts/gen-icons.mjs). -->
    <link rel="icon" href="./favicons/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./favicons/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./favicons/apple-touch-icon.png" />

    <!-- PWA / add-to-home-screen (Android + iOS). -->
    <link rel="manifest" href="./site.webmanifest" />
    <meta name="application-name" content="Sun &amp; Moon" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sun &amp; Moon" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.jsx"></script>
  </body>
</html>
